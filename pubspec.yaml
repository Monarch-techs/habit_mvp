name: habit_mvp
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^14.6.2
  
  # Database
  drift: ^2.28.2
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.31
  
  # Charts
  fl_chart: ^0.66.2
  
  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.8
  json_serializable: ^6.9.0
  drift_dev: ^2.28.0


analyzer:
  errors:
    missing_required_param: error
    missing_return: error
    invalid_assignment: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    
flutter:
  uses-material-design: true